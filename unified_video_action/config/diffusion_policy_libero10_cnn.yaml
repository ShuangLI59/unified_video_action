name: diffusion_policy

dataset_obs_steps: 2
exp_name: default
horizon: 16
keypoint_visible_rate: 1.0
n_action_steps: 8
n_latency_steps: 0
n_obs_steps: 2
obs_as_global_cond: true
past_action_visible: false
task_name: libero_10_image
dataset_type: mh

shape_meta: &shape_meta
  action:
    shape:
    - 10
  obs:
    agentview_rgb:
      shape:
      - 3
      - 128
      - 128
      type: rgb
    language:
      shape:
      - 15

shape_meta_env: &shape_meta_env
  action:
    shape:
    - 10
  obs:
    agentview_image:
      shape:
      - 3
      - 128
      - 128
      type: rgb
    
task:
  abs_action: true
  dataset:
    _target_: unified_video_action.dataset.libero_replay_image_dataset.LiberoReplayImageDataset
    abs_action: true
    dataset_path: data/libero_10
    language_emb_model: clip
    horizon: 16
    n_obs_steps: 2
    pad_after: 7
    pad_before: 1
    rotation_rep: rotation_6d
    seed: 42
    shape_meta: *shape_meta
    use_cache: true
    val_ratio: 0.02
  
  env_runner:
    _target_: unified_video_action.env_runner.libero_image_runner.LiberoImageRunner
    abs_action: true
    crf: 22
    dataset_path: data/libero_10
    fps: 10
    max_steps: 500
    n_action_steps: 8
    n_envs: null
    n_obs_steps: 2
    n_test: 3
    n_test_vis: 1
    n_train: 1
    n_train_vis: 1
    past_action: false
    render_obs_key: agentview_image
    shape_meta: *shape_meta_env
    test_start_seed: 100000
    tqdm_interval_sec: 1.0
    train_start_idx: 0
    
  name: libero_10_image
  shape_meta: *shape_meta
  task_name: libero_10

model:
  _target_: unified_video_action.workspace.train_diffusion_unet_hybrid_workspace.TrainDiffusionUnetHybridWorkspace

  policy:
    _target_: unified_video_action.policy.diffusion_unet_hybrid_image_policy.DiffusionUnetHybridImagePolicy
    pretrain_checkpoint: null
    debug: None
    cond_predict_scale: true
    crop_shape:
    - 84
    - 84
    diffusion_step_embed_dim: 128
    down_dims:
    - 512
    - 1024
    - 2048
    eval_fixed_crop: true
    horizon: 16
    kernel_size: 5
    n_action_steps: 8
    n_groups: 8
    n_obs_steps: 2
    noise_scheduler:
      _target_: diffusers.schedulers.scheduling_ddpm.DDPMScheduler
      beta_end: 0.02
      beta_schedule: squaredcos_cap_v2
      beta_start: 0.0001
      clip_sample: true
      num_train_timesteps: 100
      prediction_type: epsilon
      variance_type: fixed_small
    num_inference_steps: 100
    obs_as_global_cond: true
    obs_encoder_group_norm: true
    shape_meta: *shape_meta

optimizer:
  _target_: torch.optim.AdamW
  betas:
  - 0.95
  - 0.999
  eps: 1.0e-08
  lr: 0.0001
  weight_decay: 1.0e-06

dataloader:
  batch_size: 64
  num_workers: 8
  persistent_workers: false
  pin_memory: true
  shuffle: true

val_dataloader:
  batch_size: 64
  num_workers: 8
  persistent_workers: false
  pin_memory: true
  shuffle: false

training:
  checkpoint_every: 10
  debug: false
  device: cuda:0
  gradient_accumulate_every: 1
  lr_scheduler: cosine
  lr_warmup_steps: 500
  max_train_steps: null
  max_val_steps: null
  num_epochs: 3050
  resume: true
  rollout_every: 10
  sample_every: 5
  seed: 42
  tqdm_interval_sec: 1.0
  use_ema: true
  val_every: 1
  mixed_precision: 'fp16'

checkpoint:
  save_last_ckpt: true
  save_last_snapshot: false
  topk:
    format_str: epoch={epoch:04d}-test_mean_score={test_mean_score:.3f}.ckpt
    k: 1
    mode: max
    monitor_key: test_mean_score

ema:
  _target_: unified_video_action.model.diffusion.ema_model.EMAModel
  inv_gamma: 1.0
  max_value: 0.9999
  min_value: 0.0
  power: 0.75
  update_after_step: 0

logging:
  group: null
  id: null
  mode: online
  name: 2023.01.16-20.20.06_train_diffusion_unet_hybrid_libero_10_image
  project: diffusion_policy_debug
  resume: true
  tags:
  - train_diffusion_unet_hybrid
  - libero_10_image
  - default

multi_run:
  run_dir: data/outputs/2023.01.16/20.20.06_train_diffusion_unet_hybrid_libero_10_image
  wandb_name_base: 2023.01.16-20.20.06_train_diffusion_unet_hybrid_libero_10_image
